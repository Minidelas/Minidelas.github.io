<div class="container-fluid full-body-container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-4 bg-white main-frame">

      <div *ngIf="checkCurrentPhase(0)" id="mask-1" class="text-center">
        <h1>PRESS START!</h1>
      </div>

      <div *ngIf="checkCurrentPhaseNot(0)" id="mask-2" class="media">
        <img src="../../assets/avatar.jpeg" class="mr-3 avatar-pic">
        <div class="media-body">
          <h5 class="mt-0">{{phases[currentPhase].title}}</h5>
          {{phases[currentPhase].content}}
        </div>
      </div>

      <div class="text-center">
        <div class="btn-group" role="group">
          <button *ngFor="let but of phases[currentPhase].buttons" 
            (click)="but.callback()"
            type="button" class="btn btn-info">{{but.title}}</button>
        </div>
      </div>

    </div>
  </div>
</div>
